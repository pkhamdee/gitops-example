apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-prod
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # TODO: replace with your actual Git remote URL after pushing
    repoURL: https://github.com/<YOUR-USERNAME>/gitops-example.git
    targetRevision: HEAD
    path: apps/guestbook/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
