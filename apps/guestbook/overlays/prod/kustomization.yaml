apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guestbook

namePrefix: prod-

bases:
- ../../base
- namespace.yaml

patches:
- path: patch-replicas.yaml
- path: patch-configmap.yaml
- path: patch-resources.yaml

commonLabels:
  env: prod

images:
- name: nginx
  newTag: "1.25"
